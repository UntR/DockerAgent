version: "3.9"

# DockerAgent — 一键启动
#
# 使用方法：
#   cp .env.example .env   # 填入你的 API Key
#   docker compose up -d
#   访问 http://localhost:3000

services:
  docker-agent:
    image: rcpn7/docker-agent:latest
    # 本地构建（取消注释下两行，注释上面的 image 行）：
    # build:
    #   context: .
    container_name: docker-agent
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:8088"
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-anthropic}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-3-5-sonnet-20241022}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - DB_PATH=/data/docker_agent.db
      # 访问令牌（设置后，所有 API 请求均需携带；留空则跳过鉴权）
      - ACCESS_TOKEN=${ACCESS_TOKEN:-}
      # 允许的跨域来源，逗号分隔（留空默认 *，仅限内网）
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      # Compose 部署超时：0 = 不限时（适合大型 LLM 镜像）
      - COMPOSE_PULL_TIMEOUT=${COMPOSE_PULL_TIMEOUT:-0}
      - COMPOSE_UP_TIMEOUT=${COMPOSE_UP_TIMEOUT:-120}
      # 项目工作目录基路径（容器内路径，须与 volumes 映射保持一致）
      - PROJECTS_BASE_DIR=${PROJECTS_BASE_DIR:-/opt/docker-projects}
      # 文件所有权：写入宿主机的文件将 chown 为该 UID/GID，使普通用户可修改
      - PUID=${PUID:-}
      - PGID=${PGID:-}
    volumes:
      # ⚠️ 必须挂载，Agent 才能控制宿主机 Docker
      # Linux：
      - /var/run/docker.sock:/var/run/docker.sock
      # Docker Desktop for Mac/Windows（取消注释上面那行，改用这行）：
      # - ~/.docker/desktop/docker.sock:/var/run/docker.sock
      # ⚠️ 必须挂载（DoOD 架构关键）：
      # Agent 容器内写入的 compose 文件由宿主机 Docker Daemon 解析相对路径卷映射，
      # 因此该目录必须在宿主机上真实存在且路径与容器内一致（一比一映射）。
      # NAS 等无 /opt 目录的环境可改为其他路径（两侧须一致），
      # 并同步设置 PROJECTS_BASE_DIR 环境变量。
      - ${PROJECTS_BASE_DIR:-/opt/docker-projects}:${PROJECTS_BASE_DIR:-/opt/docker-projects}
      # 持久化数据（对话历史、LLM 配置、快照）
      - docker-agent-data:/data

volumes:
  docker-agent-data:
    name: docker-agent-data
